<form action="{{ url_for('admin.edit_category', category_id=category.id) }}" method="POST">
    {{ form.hidden_tag() }}
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
        <script>showToast({{ message|tojson }}, {{ category|tojson }});</script>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <div class="category-info mb-3">
        <span class="badge-cat"><i class="bi bi-tag-fill me-1"></i>{{ category.name }}</span>
        <div class="cat-id mt-1">ID: #{{ category.id }}</div>
    </div>
    <div class="mb-4">
        <label for="name" class="form-label">Новое название категории</label>
        <input type="text" class="form-control" id="name" name="name"
               value="{{ category.name }}" required
               oninput="document.getElementById('preview').textContent = this.value || 'Ваша категория'">
        <div class="text-center mt-3">
            <span class="tag-preview" id="preview">{{ category.name }}</span>
        </div>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn flex-grow-1 btn-orange">
            <i class="bi bi-save me-2"></i>Сохранить
        </button>
        <button type="button" class="btn btn-outline-secondary-custom px-4" data-bs-dismiss="modal">Отмена</button>
    </div>
</form>
